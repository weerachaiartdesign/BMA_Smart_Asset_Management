<!-- version 00033 (Unified Dashboard) -->

<!-- Desktop Dashboard (แสดงเฉพาะจอขนาด md ขึ้นไป) -->
<div class="hidden md:block p-8 space-y-8">
  <!-- สถิติภาพรวม Desktop -->
  <div class="grid grid-cols-4 gap-6">
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
      <p class="text-xs text-slate-500 font-bold mb-1 uppercase">ทั้งหมด</p>
      <p id="total-val" class="text-3xl font-bold text-slate-800">0</p>
    </div>
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
      <p class="text-xs text-emerald-600 font-bold mb-1 uppercase">ปกติ/ใช้งานได้</p>
      <p id="normal-val" class="text-3xl font-bold text-emerald-700">0</p>
    </div>
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
      <p class="text-xs text-orange-600 font-bold mb-1 uppercase">ชำรุด/รอซ่อม</p>
      <p id="broken-val" class="text-3xl font-bold text-orange-700">0</p>
    </div>
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
      <p class="text-xs text-slate-400 font-bold mb-1 uppercase">รอจำหน่าย</p>
      <p id="waiting-val" class="text-3xl font-bold text-slate-500">0</p>
    </div>
  </div>

  <!-- ส่วนของกราฟ Desktop -->
  <div class="grid grid-cols-2 gap-8">
    <div class="bg-white p-6 rounded-2xl shadow-sm h-90 flex flex-col">
      <p class="font-bold text-slate-700 mb-4 text-sm">แยกตามประเภท</p>
      <div class="flex-1 min-h-[300px]"><canvas id="typeChart"></canvas></div>
    </div>
    <div class="bg-white p-6 rounded-2xl shadow-sm h-90 flex flex-col">
      <p class="font-bold text-slate-700 mb-4 text-sm">แยกตามหน่วยงาน</p>
      <div class="flex-1 min-h-[300px]"><canvas id="deptChart"></canvas></div>
    </div>
  </div>
</div>

<!-- Mobile Dashboard (แสดงเฉพาะจอขนาดเล็กกว่า md) -->
<div class="block md:hidden p-4 space-y-4 pb-24">
  <!-- แถวบน Mobile: สถิติรวมและปกติ -->
  <div class="grid grid-cols-2 gap-3">
    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
      <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">ทรัพย์สินทั้งหมด</p>
      <p id="m-total" class="text-2xl font-bold text-slate-800 leading-none">0</p>
    </div>
    <div class="bg-white p-4 rounded-2xl shadow-sm border border-emerald-50">
      <p class="text-[10px] font-bold text-emerald-500 uppercase mb-1">ปกติ/ใช้งานได้</p>
      <p id="m-normal" class="text-2xl font-bold text-emerald-600 leading-none">0</p>
    </div>
  </div>

  <!-- แถวสอง Mobile: ชำรุดและรอจำหน่าย -->
  <div class="grid grid-cols-2 gap-3">
    <div class="bg-white p-4 rounded-2xl shadow-sm border border-orange-50">
      <p class="text-[10px] font-bold text-orange-500 uppercase mb-1">ชำรุด/รอซ่อม</p>
      <p id="m-broken" class="text-2xl font-bold text-orange-600 leading-none">0</p>
    </div>
    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50">
      <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">รอจำหน่าย</p>
      <p id="m-waiting" class="text-2xl font-bold text-slate-500 leading-none">0</p>
    </div>
  </div>
  
  <!-- กราฟที่ 1 Mobile: แยกตามประเภท -->
  <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col">
    <p class="font-bold text-slate-700 mb-2 text-xs">แยกตามประเภททรัพย์สิน</p>
    <div class="h-64 relative">
      <canvas id="mTypeChart"></canvas>
    </div>
  </div>

  <!-- กราฟที่ 2 Mobile: แยกตามหน่วยงาน -->
  <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col">
    <p class="font-bold text-slate-700 mb-2 text-xs">แยกตามหน่วยงาน</p>
    <div class="h-64 relative">
      <canvas id="mDeptChart"></canvas>
    </div>
  </div>
</div>
